<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QA Manager</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="app">

    <!-- Header -->
    <header class="header">

        <div class="logo">

            <h1>QA Manager</h1>
            <span>Information System</span>

        </div>

        <div class="user-area">

            <span id="loginUser">
                中西
            </span>

        </div>

    </header>


    <!-- Dashboard -->

    <section class="dashboard">

        <div class="card">
            <h2 id="countOpen">0</h2>
            <p>受付</p>
        </div>

        <div class="card">
            <h2 id="countWaiting">0</h2>
            <p>回答待ち</p>
        </div>

        <div class="card">
            <h2 id="countCompleted">0</h2>
            <p>完了</p>
        </div>

        <div class="card">
            <h2 id="countOverdue">0</h2>
            <p>期限超過</p>
        </div>

    </section>


    <!-- Search -->

    <section class="search-panel">

        <input
            type="text"
            id="keyword"
            placeholder="キーワード検索">

        <button id="searchButton">
            検索
        </button>

    </section>


    <!-- Action -->

    <section class="toolbar">

        <button id="newTicketButton">
            ＋ 新規登録
        </button>

    </section>


    <!-- Ticket List -->

    <section class="table-area">

        <table id="ticketTable">

            <thead>

            <tr>

                <th>案件ID</th>
                <th>状態</th>
                <th>担当</th>
                <th>システム</th>
                <th>ベンダー</th>
                <th>件名</th>
                <th>回答期限</th>

            </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </section>


</div>


<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/table.js"></script>
<script src="js/modal.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
