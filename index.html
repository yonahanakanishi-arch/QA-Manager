<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QA Manager | 情報システム QA管理システム</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div>
        <p class="eyebrow">Information Systems</p>
        <h1>QA Manager</h1>
      </div>
      <label class="current-user">操作担当者
        <select id="currentUser" aria-label="操作担当者"></select>
      </label>
    </header>

    <main>
      <section class="alert-bar" id="alertBar" aria-live="polite" hidden></section>

      <section class="dashboard" aria-label="案件の集計">
        <button class="summary-card" type="button" data-dashboard-filter="all">
          <span>未完了</span><strong id="countOpen">0</strong><small>件</small>
        </button>
        <button class="summary-card waiting" type="button" data-dashboard-filter="回答待ち">
          <span>回答待ち</span><strong id="countWaiting">0</strong><small>件</small>
        </button>
        <button class="summary-card completed" type="button" data-dashboard-filter="完了">
          <span>今月完了</span><strong id="countCompleted">0</strong><small>件</small>
        </button>
        <button class="summary-card overdue" type="button" data-dashboard-filter="overdue">
          <span>期限超過</span><strong id="countOverdue">0</strong><small>件</small>
        </button>
      </section>

      <section class="search-panel">

    <div class="search-row">

        <div class="search-item">
            <label>キーワード</label>
            <input
                type="text"
                id="keyword"
                placeholder="案件ID・件名・問い合わせ内容"
            >
        </div>

    </div>

    <div class="search-row">

        <div class="search-item">

            <label>状態</label>

            <select id="statusFilter">
                <option value="">すべて</option>
            </select>

        </div>

        <div class="search-item">

            <label>担当</label>

            <select id="staffFilter">
                <option value="">すべて</option>
            </select>

        </div>

        <div class="search-item">

            <label>システム</label>

            <select id="systemFilter">
                <option value="">すべて</option>
            </select>

        </div>

        <div class="search-item">

            <label>ベンダー</label>

            <select id="vendorFilter">
                <option value="">すべて</option>
            </select>

        </div>

    </div>

    <div class="search-buttons">

        <button id="searchButton">
            検索
        </button>

        <button
            id="clearButton"
            class="secondary"
        >
            クリア
        </button>

    </div>

</section>

<div class="table-info">

    <span id="recordCount">
        全0件
    </span>

</div>

      <section class="panel list-panel" aria-labelledby="listTitle">
        <div class="panel-heading list-heading">
          <div><p class="eyebrow">Tickets</p><h2 id="listTitle">案件一覧 <span id="resultCount" class="result-count">0件</span></h2></div>
          <div class="actions">
            <button class="button secondary" id="reloadButton" type="button">再読込</button>
            <button class="button primary" id="newTicketButton" type="button" disabled>＋ 新規登録</button>
          </div>
        </div>
        <div class="table-scroll">
          <table id="ticketTable">
            <thead><tr>
              <th>案件ID</th><th>状態</th><th>優先度</th><th>担当</th><th>システム</th>
              <th>ベンダー</th><th>件名</th><th>回答期限</th><th>経過</th><th>更新日時</th>
            </tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <p id="emptyMessage" class="empty-message" hidden>条件に一致する案件はありません。</p>
      </section>
    </main>
  </div>

  <div id="ticketModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="ticketModalTitle" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <section class="modal-dialog">
      <div class="modal-header">
        <div><p class="eyebrow">New ticket</p><h2 id="ticketModalTitle">新規案件登録</h2></div>
        <button class="icon-button" type="button" data-close-modal aria-label="閉じる">×</button>
      </div>
      <form id="ticketForm">
        <div class="form-grid">
          <label class="field">対象システム <select name="システム" id="ticketSystem" required></select></label>
          <label class="field">ベンダー <select name="ベンダー" id="ticketVendor" required></select></label>
          <label class="field">担当者 <select name="担当者" id="ticketOwner" required></select></label>
          <label class="field">優先度 <select name="優先度" id="ticketPriority" required></select></label>
          <label class="field">問い合わせ区分 <select name="問い合わせ区分" id="ticketCategory" required></select></label>
          <label class="field">回答期限 <input name="回答期限" type="date"></label>
          <label class="field">問い合わせ元部署 <input name="問い合わせ元部署" maxlength="100" placeholder="例：薬剤部"></label>
          <label class="field">問い合わせ元担当者 <input name="問い合わせ元担当者" maxlength="100" placeholder="例：山田 太郎"></label>
          <label class="field span-2">件名 <input name="件名" maxlength="200" required placeholder="問い合わせの要点を入力"></label>
          <label class="field span-2">問い合わせ内容 <textarea name="問い合わせ内容" rows="7" required placeholder="発生状況、確認したいこと、必要な背景を入力"></textarea></label>
        </div>
        <p class="required-note">* は必須項目です。案件ID・受付日・状態は自動設定されます。</p>
        <div class="modal-actions">
          <button class="button secondary" type="button" data-close-modal>キャンセル</button>
          <button id="submitTicket" class="button primary" type="submit">登録する</button>
        </div>
      </form>
    </section>
  </div>

  <div id="detailModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="detailModalTitle" hidden>
    <div class="modal-backdrop" data-close-detail></div>
    <section class="modal-dialog modal-dialog-wide">
      <div class="modal-header">
        <div><p class="eyebrow" id="detailTicketId">Ticket</p><h2 id="detailModalTitle">案件詳細・更新</h2></div>
        <button class="icon-button" type="button" data-close-detail aria-label="閉じる">×</button>
      </div>
      <form id="detailForm">
        <input name="案件ID" id="detailId" type="hidden">
        <div class="detail-section"><h3>基本情報</h3>
          <dl class="record-summary">
            <div><dt>受付日</dt><dd id="detailReceivedDate">—</dd></div><div><dt>登録者</dt><dd id="detailCreator">—</dd></div>
            <div><dt>登録日時</dt><dd id="detailCreatedAt">—</dd></div><div><dt>最終更新</dt><dd id="detailUpdatedAt">—</dd></div>
          </dl>
          <div class="form-grid">
            <label class="field">対象システム <select name="システム" id="detailSystem" required></select></label>
            <label class="field">ベンダー <select name="ベンダー" id="detailVendor" required></select></label>
            <label class="field">担当者 <select name="担当者" id="detailOwner" required></select></label>
            <label class="field">優先度 <select name="優先度" id="detailPriority" required></select></label>
            <label class="field">状態 <select name="状態" id="detailStatus" required></select></label>
            <label class="field">問い合わせ区分 <select name="問い合わせ区分" id="detailCategory" required></select></label>
            <label class="field">送付日 <input name="送付日" id="detailSentDate" type="date"></label>
            <label class="field">最終催促日 <input name="最終催促日" id="detailFollowupDate" type="date"></label>
            <label class="field">回答期限 <input name="回答期限" id="detailDueDate" type="date"></label>
            <label class="field">回答予定日 <input name="回答予定日" id="detailPlannedDate" type="date"></label>
            <label class="field">回答日 <input name="回答日" id="detailAnswerDate" type="date"></label>
            <label class="field">ベンダー管理番号 <input name="ベンダー管理番号" id="detailVendorCase" maxlength="100"></label>
            <label class="field">問い合わせ元部署 <input name="問い合わせ元部署" id="detailDepartment" maxlength="100"></label>
            <label class="field">問い合わせ元担当者 <input name="問い合わせ元担当者" id="detailRequester" maxlength="100"></label>
            <label class="field span-2">件名 <input name="件名" id="detailSubject" maxlength="200" required></label>
            <label class="field span-2">問い合わせ内容 <textarea name="問い合わせ内容" id="detailInquiry" rows="5" required></textarea></label>
          </div>
        </div>
        <div class="detail-section"><h3>回答・完了</h3>
          <div class="form-grid">
            <label class="field span-2">回答内容 <textarea name="回答内容" id="detailAnswer" rows="6"></textarea></label>
            <label class="field">完了理由 <input name="完了理由" id="detailCompletionReason" maxlength="200"></label>
            <label class="checkbox-field"><input type="checkbox" name="ナレッジ対象" id="detailKnowledge"> ナレッジ対象として残す</label>
            <label class="field span-2">備考 <textarea name="備考" id="detailNotes" rows="3"></textarea></label>
          </div>
        </div>
        <div class="detail-section history-section"><h3>履歴</h3><ol id="historyList" class="history-list"><li>読み込み中…</li></ol></div>
        <div class="modal-actions"><button class="button secondary" type="button" data-close-detail>閉じる</button><button id="saveTicket" class="button primary" type="submit">変更を保存</button></div>
      </form>
    </section>
  </div>

  <div id="loading" class="loading" role="status" aria-live="polite" hidden><span></span>読み込み中…</div>
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="js/api.js"></script>
  <script src="js/table.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
